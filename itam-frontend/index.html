<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/env-config.js"></script>
    <meta name="description" content="Hệ thống Quản lý Tài sản CNTT (IT Asset Management) hiện đại, theo dõi tài sản, tồn kho, mã QR và bảo trì." />
    <title>ITAM — Quản lý Tài sản CNTT</title>
  </head>
  <body>
    <div id="root">
      <!-- Inline FCP Loading Skeleton (Bilingual Support) -->
      <div style="display:flex;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;background-color:#f8fafc;color:#0f172a;font-family:system-ui,-apple-system,sans-serif;">
        <div style="width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#4f46e5;border-radius:50%;animation:itam-spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;margin-bottom:16px;"></div>
        <p id="fcp-loading-text" style="font-size:14px;font-weight:500;color:#64748b;letter-spacing:0.3px;">Đang tải hệ thống ITAM...</p>
        <script>
          (function() {
            var lang = localStorage.getItem('language') || 'vi';
            document.documentElement.lang = lang;
            if (lang.startsWith('en')) {
              var el = document.getElementById('fcp-loading-text');
              if (el) el.textContent = 'Loading ITAM system...';
              document.title = 'ITAM — IT Asset Management';
            }
          })();
        </script>
      </div>
      <style>@keyframes itam-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
