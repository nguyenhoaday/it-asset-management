server:
  port: ${SERVER_PORT:8080}
  tomcat:
    accept-count: 150
    max-connections: 500
    threads:
      max: 100
      min-spare: 10
    connection-timeout: 5000

spring:
  application:
    name: itam-backend

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/itam_db}
    username: ${SPRING_DATASOURCE_USERNAME:itam_user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:tai-khoan-cua-ban@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:mat-khau-ung-dung}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

jwt:
  secret: "${JWT_SECRET:jws_secret_key}"
  expiration-ms: ${JWT_EXPIRATION_MS:900000} # 15m default
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7d default

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}
  admin:
    emergency-reset-password: ${APP_ADMIN_EMERGENCY_RESET_PASSWORD:}
  mail:
    from-email: ${SPRING_MAIL_USERNAME:tai-khoan-cua-ban@gmail.com}
    from-name: ${SPRING_MAIL_FROM_NAME:Hệ thống ITAM}
  security:
    cookie-secure: ${APP_COOKIE_SECURE:false}
    cookie-same-site: ${APP_COOKIE_SAME_SITE:Lax}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# spring actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
